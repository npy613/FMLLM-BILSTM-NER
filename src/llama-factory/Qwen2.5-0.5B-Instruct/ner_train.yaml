### model
model_name_or_path: /home/niupeiyu/workspace/deprecated/mynlp/hf_models/Qwen2.5-0.5B-Instruct
trust_remote_code: false


### method
stage: sft
do_train: true
finetuning_type: lora
lora_alpha: 32
lora_dropout: 0.1
lora_rank: 16
lora_target: all

### dataset
dataset: conll2003_llmf_train
dataset_dir: /LLaMA-Factory/data
template: qwen
cutoff_len: 512
# max_samples: 1000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/Qwen2.5-0.5B-Instruct/lora/ner-sft
logging_steps: 10
save_steps: 1000
plot_loss: true
# overwrite_output_dir: true 
overwrite_output_dir: false  
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1e-04
num_train_epochs: 10.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
# resume_from_checkpoint: null


### eval
do_eval: false
eval_dataset: conll2003_llmf_valid
# val_size: 0.1
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 1000
